<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A paper-and-code pipeline that generates interactive technical explainers.">
  <title>Living Technical Atlas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to explainer</a>
  <header class="masthead">
    <a class="brand" href="#overview" aria-label="Living Technical Atlas overview">
      <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
      <span><strong>Living Technical Atlas</strong><small>paper + code → teachable system</small></span>
    </a>
    <nav class="top-tabs" aria-label="Atlas views" role="tablist" id="top-tabs"></nav>
    <button class="source-toggle" id="source-toggle" type="button" aria-expanded="false" aria-controls="source-panel">Sources</button>
  </header>

  <div class="status-strip" id="status-strip" role="status" aria-live="polite">
    <span class="status-dot"></span><span>Loading validated bundles</span>
  </div>

  <main id="main" tabindex="-1">
    <section id="overview-view" class="overview-view" hidden></section>
    <div id="paper-view" class="paper-shell" hidden>
      <aside class="section-rail" aria-label="Lesson sections">
        <div class="rail-kicker">Generated path</div>
        <nav id="section-nav"></nav>
      </aside>
      <article class="lesson" id="lesson"></article>
      <aside class="source-panel" id="source-panel" aria-label="Sources and deep links"></aside>
    </div>
    <section id="appendix-view" class="appendix-view" hidden></section>
  </main>

  <footer>
    <span>One renderer. Two reviewed agent runs. Every asset hash checked.</span>
    <a href="data/site_manifest.json">site manifest</a>
  </footer>
  <noscript>This explainer needs JavaScript to load its generated bundles.</noscript>
  <script src="app.js" defer></script>
</body>
</html>
