<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
<style>
text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2933; }
.title { font-size: 22px; font-weight: 700; }
.label { font-size: 13px; }
.small { font-size: 11px; fill: #52616b; }
.axis { stroke: #2f3a45; stroke-width: 1.2; }
.grid { stroke: #d8dee6; stroke-width: 1; }
.legend { font-size: 12px; }
</style>
<text class="title" x="64" y="42">FeynRL execution modes: sync vs. overlap</text>
<text class="small" x="64" y="64">The same objective can see very different policy-ratio distributions depending on scheduling.</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#2f3a45"/></marker></defs>
<text class="label" x="64" y="116" font-weight="700">Sync mode</text>
<rect x="70" y="140" width="160" height="72" rx="6" fill="#2f80ed" opacity="0.9"/>
<text x="150.0" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">rollout</text>
<text x="150.0" y="190" text-anchor="middle" font-size="11" fill="#ffffff">pi_v</text>
<rect x="270" y="140" width="160" height="72" rx="6" fill="#2c9c69" opacity="0.9"/>
<text x="350.0" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">train</text>
<text x="350.0" y="190" text-anchor="middle" font-size="11" fill="#ffffff">fresh batch</text>
<rect x="470" y="140" width="160" height="72" rx="6" fill="#8b5cf6" opacity="0.9"/>
<text x="550.0" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">sync weights</text>
<text x="550.0" y="190" text-anchor="middle" font-size="11" fill="#ffffff">v -> v+1</text>
<rect x="670" y="140" width="160" height="72" rx="6" fill="#2f80ed" opacity="0.9"/>
<text x="750.0" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">rollout</text>
<text x="750.0" y="190" text-anchor="middle" font-size="11" fill="#ffffff">pi_v+1</text>
<line x1="230" y1="176" x2="270" y2="176" stroke="#2f3a45" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="430" y1="176" x2="470" y2="176" stroke="#2f3a45" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="630" y1="176" x2="670" y2="176" stroke="#2f3a45" stroke-width="2" marker-end="url(#arrow)"/>
<text class="small" x="72" y="232">Easy to reason about: rollout data is close to on-policy, so ratio mass stays near 1.</text>
<text class="label" x="64" y="300" font-weight="700">Overlap / async mode</text>
<rect x="70" y="324" width="210" height="72" rx="6" fill="#2f80ed" opacity="0.9"/>
<text x="175.0" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">rollout workers</text>
<text x="175.0" y="374" text-anchor="middle" font-size="11" fill="#ffffff">continuous generation</text>
<rect x="330" y="324" width="210" height="72" rx="6" fill="#f59e0b" opacity="0.9"/>
<text x="435.0" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">bounded replay</text>
<text x="435.0" y="374" text-anchor="middle" font-size="11" fill="#ffffff">versions v-k ... v</text>
<rect x="590" y="324" width="210" height="72" rx="6" fill="#2c9c69" opacity="0.9"/>
<text x="695.0" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">training workers</text>
<text x="695.0" y="374" text-anchor="middle" font-size="11" fill="#ffffff">consume mixed data</text>
<rect x="420" y="446" width="210" height="64" rx="6" fill="#8b5cf6" opacity="0.9"/>
<text x="525.0" y="474" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">periodic NCCL sync</text>
<text x="525.0" y="496" text-anchor="middle" font-size="11" fill="#ffffff">policy version advances</text>
<line x1="280" y1="360" x2="330" y2="360" stroke="#2f3a45" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="540" y1="360" x2="590" y2="360" stroke="#2f3a45" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="695" y1="396" x2="630" y2="446" stroke="#2f3a45" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="420" y1="478" x2="180" y2="396" stroke="#2f3a45" stroke-width="2" marker-end="url(#arrow)"/>
<text class="small" x="72" y="528">Higher throughput, but replay can be stale. Fixed-clip methods need extra decoupling; P3O adapts from ESS.</text>
</svg>
